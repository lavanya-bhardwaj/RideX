{% extends 'base.html' %}

{% block content %}
<section class="admin-dashboard-section" style="padding-top: 120px;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="login-box">
                    <p class="hero-tagline">EDIT BOOKING</p>
                    <h2 class="mb-4">Booking #{{ booking.id }}</h2>
                    <form method="POST">
                        <div class="mb-4">
                            <label class="form-label">Customer Name</label>
                            <input type="text" name="customer_name" class="form-control dark-input" value="{{ booking.customer_name }}" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Phone</label>
                            <input type="tel" name="customer_phone" class="form-control dark-input" value="{{ booking.customer_phone }}" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Booking Date</label>
                            <input type="date" name="booking_date" class="form-control dark-input" value="{{ booking.booking_date.strftime('%Y-%m-%d') }}" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Status</label>
                            <select name="status" class="form-control dark-input">
                                <option value="pending" {% if booking.status == 'pending' %}selected{% endif %}>Pending</option>
                                <option value="approved" {% if booking.status == 'approved' %}selected{% endif %}>Approved</option>
                                <option value="rejected" {% if booking.status == 'rejected' %}selected{% endif %}>Rejected</option>
                            </select>
                        </div>
                        <button type="submit" class="btn-primary-red w-100 py-3">Save Changes →</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
