{% extends 'base.html' %}

{% block content %}
<section class="booking-section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-7" data-aos="fade-up">
                
                <p class="hero-tagline">BOOK YOUR RIDE</p>
                <h1 class="detail-name">{{ bike.name }}</h1>
                <p class="bike-price mb-4">₹{{ bike.price_per_day }}/day</p>

                <div class="booking-form">
                    <form method="POST">
                        <div class="mb-4">
                            <label class="form-label">Full Name</label>
                            <input type="text" name="customer_name" class="form-control dark-input" placeholder="Enter your name" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Phone Number</label>
                            <input type="tel" name="customer_phone" class="form-control dark-input" placeholder="Enter your phone number" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Pickup Date</label>
                            <input type="date" name="booking_date" class="form-control dark-input" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Return Date</label>
                            <input type="date" name="return_date" class="form-control dark-input" required>
                        </div>
                        <button type="submit" class="btn-primary-red w-100 py-3">
                            Confirm Booking →
                        </button>
                    </form>
                </div>

            </div>

            <div class="col-md-5 d-none d-md-block" data-aos="fade-left">
                <img src="{{ url_for('static', filename='images/' + bike.image_file) }}" 
                     alt="{{ bike.name }}" class="booking-bike-img">
            </div>
        </div>
    </div>
</section>
{% endblock %}
